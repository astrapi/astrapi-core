{#
  app/templates/partials/confirm_modal.html
  Wird per HTMX in <body> eingefügt (hx-swap="beforeend").
  Variablen: description, verb, confirm_url, method, container_id, loading_id
#}
<div class="ds-modal-backdrop"
     x-data
     x-init="$nextTick(() => $el.querySelector('.confirm-dialog').focus())"
     x-on:keydown.escape.window="$el.remove()"
     x-on:click.self="$el.remove()">

  <div class="confirm-dialog" tabindex="-1">

    <div class="confirm-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <circle cx="12" cy="17" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
    </div>

    <p style="text-align:center; font-size:14px; color:var(--text-2); margin-bottom:6px; font-weight:600;">
      {{ description }}
    </p>
    <p style="text-align:center; font-size:13px; color:var(--text-3); margin-bottom:24px;">
      Möchtest du diesen Eintrag wirklich <strong style="color:var(--text-2);">{{ verb }}</strong>?
    </p>

    <div style="display:flex; gap:10px; justify-content:center;">
      <button class="btn btn-ghost"
              x-on:click="$el.closest('.ds-modal-backdrop').remove()">
        Abbrechen
      </button>
      <button class="btn btn-danger"
              hx-{{ method }}="{{ confirm_url }}"
              hx-target="#{{ container_id }}"
              hx-swap="innerHTML"
              x-on:click="$el.closest('.ds-modal-backdrop').remove()">
        {{ verb | capitalize }}
      </button>
    </div>

  </div>
</div>
