{% macro render(title_html, enabled=True, toggle_html="", footer_left="", footer_right="") -%}
<div class="ds-card {{ 'on' if enabled else 'off' }}">
  <div class="card-header">
    <span class="card-title">
      {{ title_html | safe }}
    </span>
    {{ toggle_html | safe }}
  </div>
  <div class="card-body">
    {{ caller() }}
  </div>
  <div class="card-footer">
    <div style="display:flex; gap:2px; align-items:center;">
      {{ footer_left | safe }}
    </div>
    <div style="display:flex; gap:2px; align-items:center;">
      {{ footer_right | safe }}
    </div>
  </div>
</div>
{%- endmacro %}
