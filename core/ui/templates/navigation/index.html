{% macro svg_icon(name) -%}
<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <use href="#icon-{{ name if name else 'default' }}"></use>
</svg>
{%- endmacro %}

<aside id="sidebar">
<div class="sb-scroll">

  <!-- Logo — anpassen in app/config.py via app_name / app_logo_svg -->
  <div class="sb-logo">
    <span class="sb-logo-text">{{ app_name }}</span>
  </div>

  <!-- Navigation -->
  <hr class="sb-divider">
  <nav class="nav-items">
    {% for item in nav_items %}
      {% if item.separator %}
        <div class="nav-separator {{ 'nav-separator-first' if loop.first else '' }}">
          {% if item.group %}<span class="nav-group-label">{{ item.group }}</span>{% endif %}
        </div>
      {% else %}
      <button
        type="button"
        hx-get="/ui/{{ item.key }}/content"
        hx-target="#main-content"
        hx-swap="innerHTML"
        hx-push-url="{{ item.url }}"
        id="nav-{{ item.key }}"
        class="nav-item {% if item.default %}active{% endif %}"
      >
        {{ svg_icon(item.icon if item.icon is defined else '') }}
        <span>{{ item.label }}</span>
      </button>
      {% endif %}
    {% endfor %}
  </nav>

  <!-- Footer -->
  <div class="sb-footer">
    <hr class="sb-divider">
    <div class="sb-footer-bottom">
      <div class="sb-versions">
        <span class="sb-version">{{ app_name }} {{ app_version }}</span>
        <span class="sb-version">UI Framework {{ core_version }}</span>
      </div>
    </div>
  </div>

</div>{# /sb-scroll #}
</aside>

<script>
  // Handle active navigation item
  document.addEventListener('DOMContentLoaded', function () {
    const sidebar = document.getElementById('sidebar');
    if (!sidebar) return;

    sidebar.addEventListener('click', function (e) {
      const navItem = e.target.closest('.nav-item');
      if (!navItem) return;
      sidebar.querySelectorAll('.nav-item.active').forEach(item => item.classList.remove('active'));
      navItem.classList.add('active');
    });
  });

(function() {
  function updateThemeIcon() {
    const isLight = document.documentElement.classList.contains('light-mode');
    document.getElementById('icon-moon').style.display = isLight ? 'block' : 'none';
    document.getElementById('icon-sun').style.display  = isLight ? 'none'  : 'block';
  }
  updateThemeIcon();
  const orig = window.toggleDarkMode;
  window.toggleDarkMode = function() {
    if (orig) orig();
    else {
      document.documentElement.classList.toggle('light-mode');
      localStorage.setItem('lightMode', document.documentElement.classList.contains('light-mode') ? '1' : '0');
    }
    updateThemeIcon();
  };
})();
</script>
