{% if ok %}
<span style="font-size:13px; color:#4ade80; padding:3px 9px;
             border-radius:var(--rad); background:rgba(74,222,128,0.10);
             display:inline-flex; align-items:center; gap:5px;">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><use href="#icon-check"></use></svg>
  {{ msg }}
</span>
{% else %}
<span style="font-size:13px; color:var(--err); padding:3px 9px;
             border-radius:var(--rad); background:var(--err-bg);
             display:inline-flex; align-items:center; gap:5px;">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><use href="#icon-close"></use></svg>
  {{ msg }}
</span>
{% endif %}
