# app/templates/partials/create_edit/schemas.yaml
# ── Formular-Schemas für CRUD-Modals ────────────────────────────────────────
# Jeder Schlüssel entspricht einem Modul-Namen (= Nav-Key).
# Das Schema wird von create_edit_modal.html gerendert.
#
# Feldtypen: text | password | email | url | number | select | textarea

items:
  fields:
    - key: name
      label: Name
      type: text
      required: true
      placeholder: "z. B. mein-eintrag"

    - key: description
      label: Beschreibung
      type: text
      placeholder: "Kurze Beschreibung"

    - key: host
      label: Host / URL
      type: text
      placeholder: "server.example.com"

    - key: enabled
      label: Aktiv
      type: select
      options: ["true", "false"]

