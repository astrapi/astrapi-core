# app/templates/navigation/items.yaml
# ── Navigation ──────────────────────────────────────────────────────────────
# Reihenfolge bestimmt die Anzeigereihenfolge im Menü.
# Genau ein Eintrag darf default: true haben (sonst: erster Eintrag).
#
# Verfügbare Icons:
#   home | list | chart | clock | alert | settings | database |
#   users | server | shield | monitor | archive | search
#
# Eine neue Seite hinzufügen:
#   1. Eintrag hier ergänzen (key, label, icon)
#   2. Partial anlegen: app/templates/partials/lists/<key>.html
#   → Fertig. Keine weitere Konfiguration nötig.
#
# Eigene API-Route:
#   url: /api/mein/eigener/endpunkt  (optional, default: /api/ui/<key>/tab)

- separator: true
  group: Übersicht

- key: overview
  label: Übersicht
  url: /api/ui/overview/tab
  icon: home
  default: true

- separator: true
  group: Verwaltung

- key: items
  label: Einträge
  url: /api/ui/items/tab
  icon: list

- separator: true
  group: System

- key: settings
  label: Einstellungen
  url: /api/ui/settings/tab
  icon: settings
