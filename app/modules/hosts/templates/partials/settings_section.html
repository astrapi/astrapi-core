{# Einstellungs-Sektion für das Hosts-Modul – wird in settings.html eingebettet #}
<form hx-post="/ui/settings/save/module/hosts"
      hx-target="#settings-container"
      hx-swap="innerHTML">
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;">
    <div class="form-group">
      <label class="form-label">Standard-Port</label>
      <input class="form-input" type="number" name="default_port"
             value="{{ settings.get('module.hosts.default_port', '22') }}">
    </div>
    <div class="form-group">
      <label class="form-label">Standard-User</label>
      <input class="form-input" type="text" name="default_user"
             value="{{ settings.get('module.hosts.default_user', 'root') }}">
    </div>
    <div class="form-group">
      <label class="form-label">Verbindungs-Timeout (s)</label>
      <input class="form-input" type="number" name="connect_timeout"
             value="{{ settings.get('module.hosts.connect_timeout', '10') }}">
    </div>
  </div>
  <div style="display:flex; justify-content:flex-end; margin-top:14px;">
    <button type="submit" class="btn btn-primary btn-sm">Speichern</button>
  </div>
</form>
