{# Einstellungs-Sektion für das Tasks-Modul #}
<form hx-post="/ui/settings/save/module/tasks"
      hx-target="#settings-container"
      hx-swap="innerHTML">
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;">
    <div class="form-group">
      <label class="form-label">Standard-Schedule</label>
      <input class="form-input" type="text" name="default_schedule"
             value="{{ settings.get('module.tasks.default_schedule', '0 2 * * *') }}"
             placeholder="0 2 * * *">
    </div>
    <div class="form-group">
      <label class="form-label">Max. Wiederholungen</label>
      <input class="form-input" type="number" name="max_retries"
             value="{{ settings.get('module.tasks.max_retries', '3') }}">
    </div>
    <div class="form-group">
      <label class="form-label">Timeout (s)</label>
      <input class="form-input" type="number" name="timeout"
             value="{{ settings.get('module.tasks.timeout', '300') }}">
    </div>
  </div>
  <div style="display:flex; justify-content:flex-end; margin-top:14px;">
    <button type="submit" class="btn btn-primary btn-sm">Speichern</button>
  </div>
</form>
