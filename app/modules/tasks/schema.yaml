# app/modules/tasks/schema.yaml
# Felder für Create- und Edit-Dialog

id_field:
  name: task_id
  label: Task-ID
  placeholder: "z. B. backup-daily"
  max: 50

fields:
  - name: description
    type: text
    label: Beschreibung
    placeholder: "Tägliches Backup"
    max: 100
    column: 1
    row: 1

  - name: command
    type: text
    label: Befehl
    placeholder: "/usr/local/bin/backup.sh"
    max: 200
    column: 1
    row: 2

  - name: schedule
    type: text
    label: Cron-Schedule
    placeholder: "0 2 * * *"
    max: 50
    column: 2
    row: 2

  - name: enabled
    type: boolean
    label: Aktiv
    column: 2
    row: 1
