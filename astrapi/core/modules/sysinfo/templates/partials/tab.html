{% if not info.ok %}
<div class="empty-state">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  <div class="empty-state-title">Systeminfo nicht verfügbar</div>
  <div class="empty-state-sub">{{ info.error }}</div>
</div>
{% else %}

<div class="page-header">
  <div class="page-header-main">
    <div class="page-title">System</div>
  </div>
  <div class="page-header-actions">
    <span class="page-subtitle" style="font-family:var(--mono);">Stand: <span id="sysinfo-time">{{ info.collected_at }}</span></span>
    <button class="btn btn-ghost btn-sm"
            hx-get="/ui/sysinfo/metrics"
            hx-target="#sysinfo-metrics"
            hx-swap="innerHTML"
            hx-indicator="#sysinfo-spinner">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Aktualisieren
    </button>
    <svg id="sysinfo-spinner" class="htmx-indicator" width="14" height="14"
         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         style="animation:spin 1s linear infinite; display:none;">
      <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
      <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
      <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
    </svg>
  </div>
</div>

<div id="sysinfo-metrics">
  {% include "sysinfo/partials/metrics.html" %}
</div>

<style>
@keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
.htmx-request #sysinfo-spinner { display:block !important; }
</style>
<script>
document.body.addEventListener('htmx:afterSettle', function(e) {
  if (e.target && e.target.id === 'sysinfo-metrics') {
    var t = e.target.querySelector('[data-collected-at]');
    if (t) {
      var el = document.getElementById('sysinfo-time');
      if (el) el.textContent = t.dataset.collectedAt;
    }
  }
});
</script>

{% endif %}
